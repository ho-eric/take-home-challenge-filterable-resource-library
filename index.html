<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Library</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header class="site-header">
        <h1>Resource Library</h1>
    </header>

    <div class="container library-wrapper">
        <aside class="filters-sidebar">
            <section class="filter-group">
                <label for="search-input">Search Resources</label>
                <input type="text" id="search-input" placeholder="Search">
            </section>

            <section class="filter-group">
                <h3>Content Type</h3>
                <div id="type-filters">
                    <label><input type="checkbox" value="Article"> Article</label>
                    <label><input type="checkbox" value="Video"> Video</label>
                    <label><input type="checkbox" value="Research Paper"> Research Paper</label>
                    <label><input type="checkbox" value="Clinical Trial"> Clinical Trial</label>
                    <label><input type="checkbox" value="Patient Story"> Patient Story</label>
                </div>
            </section>

            <section class="filter-group">
                <h3>Condition</h3>
                <div id="type-filters">
                    <label><input type="checkbox" value="Depression"> Depression</label>
                    <label><input type="checkbox" value=" Bipolar Disorder">  Bipolar Disorder</label>
                    <label><input type="checkbox" value="Schizophrenia"> Schizophrenia</label>
                    <label><input type="checkbox" value="Anxiety"> Anxiety</label>
                    <label><input type="checkbox" value="ADHD"> ADHD</label>
                    <label><input type="checkbox" value="General Mental Health"> General Mental Health</label>
                </div>
            </section>

            <section class="filter-group">
                <h3>Sort By</h3>
                <select id="sort-select">
                    <option value="none">-</option>
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="alpha">A - Z</option>
                    <option value="alphaRev">Z - A</option>
                </select>
            </section>
        </aside>

        <main class="results-area">
            <!-- <header class="results-header">
                <span id="result-count">Showing 0 of 0 resources</span>
            </header> -->
            
            <div id="resource-grid" class="grid">
            </div>

            <!-- <div id="no-results" class="hidden">
                <p>No resources match your criteria. Try resetting your filters.</p>
            </div> -->
        </main>
    </div>

    <template id="card-template">
        <article class="resource-card">
            <header>
                <span class="type-badge"></span>
                <time class="post-date"></time>
            </header>
            <h2 class="resource-title"></h2>
            <p class="resource-excerpt"></p>
            <p class="resource-content-type"></p>
            <p class="resource-condition"></p>
            <p class="resource-author"></p>
            <a href="" class="read-more">View Resource</a>
        </article>
    </template>

    <script src="assets/js/main.js"></script>
</body>
</html>
